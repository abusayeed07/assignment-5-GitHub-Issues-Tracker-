<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisyUi & Tailwind css  -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.css" rel="stylesheet" type="text/css" />

    <!-- font Awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>GitHub Issues Tracker</title>

    <style>
        body {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-white min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-[520px] bg-base-200 shadow-2xl">
        <div class="card-body">
            <!-- Header exactly as in image -->
            <div class="items-center mx-auto">
                <img src="./assets/github-logo.png" alt="" class="w-[100px] h-[100px] mx-auto mb-6">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-sm mb-4 text-center">Sign in to manage your issues</p>
            </div>


            <!-- Form fields exactly as described -->
            <form id="loginForm" class="space-y-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text text-xl">Username</span>
                    </label>
                    <input type="text" placeholder="Enter Username"
                        class="input input-bordered bg-base-200 text-base-content" id="username">
                    <label class="label">
                        <span class="label-text-alt text-base-content/60 text-[#4A00FF]">Default: admin</span>
                    </label>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text text-xl">Password</span>
                    </label>
                    <input type="password" placeholder="Enter Password"
                        class="input input-bordered bg-base-200 text-base-content" id="password">
                    <label class="label">
                        <span class="label-text-alt text-base-content/60 text-[#4A00FF]">Default: admin123</span>
                    </label>
                </div>

                <!-- Sign In button -->
                <button class="btn w-full mt-2 text-xl bg-[#4A00FF] hover:bg-[#3a00cc] text-white">Sign In</button>

            </form>



            <!-- OR divider -->
            <div class="divider">OR</div>

            <!-- Demo Credentials exactly as in image -->
            <div class="border border-base-300 rounded-lg p-4 bg-base-200 text-base-content mx-auto">
                <p class="font-medium mb-5 text-[#64748B]">Demo Credentials:</p>
                <div class="space-y-1">
                    <p><span class="font-bold">Username:</span> admin</p>
                    <p><span class="font-bold">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </div>

    <script src="./scripts/script.js"></script>
</body>

</html>
