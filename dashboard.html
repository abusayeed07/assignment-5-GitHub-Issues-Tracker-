<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GItHub Issues Tracker | Dashboard</title>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisyUi & Tailwind css  -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.css" rel="stylesheet" type="text/css" />

    <!-- font Awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-black-600 rounded-full flex items-center justify-center">
                        <img src="./assets/github-logo.png" alt="">
                    </div>
                    <span class="font-bold text-xl text-gray-800">GitHub Issues Tracker</span>
                </div>

                <!-- Search -->
                <div class="flex-1 max-w-lg mx-4">
                    <div class="relative">
                        <input type="text" id="searchInput"
                            class="w-full px-4 py-2 pr-20 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                            placeholder="Search issues...">
                        <button id="searchBtn"
                            class="absolute right-1 top-1 px-4 py-1 bg-blue-600 text-white rounded-md hover:bg-blue-700"><i class="fa-brands fa-sistrix"></i> Search
                        </button>
                    </div>
                </div>

                <div>
                    <button class="btn btn-primary">New Issue</button>
                </div>
                <!-- Logout -->
                <button id="logoutBtn" class="btn btn-outline btn-primary">
                   <i class="fa-solid fa-right-from-bracket"></i> Log out
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tabs -->
        <div class="border-b border-gray-200">
            <nav class="flex space-x-8">
                <button class="tab-btn active py-2 px-1 border-b-2 border-blue-500 text-blue-600 font-medium"
                    data-filter="all">
                    All
                </button>
                <button
                    class="tab-btn py-2 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium"
                    data-filter="open">
                    Open
                </button>
                <button
                    class="tab-btn py-2 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium"
                    data-filter="closed">
                    Closed
                </button>
            </nav>
        </div>

        <!-- Stats Bar -->
        <div class="flex flex-wrap items-center justify-between py-4">
            <div class="flex items-center space-x-4">
                <img src="./assets/Aperture.png" alt="">
                <span class="text-gray-700">
                    <span id="issueCount">0</span> issues
                </span>
                <span class="text-gray-300">|</span>
                <span class="text-sm text-gray-500" id="statsText">Showing all issues</span>
            </div>
            <div class="flex items-center space-x-3">
                <span class="flex items-center text-sm">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-1"></span>
                    <span id="openCount">0</span> Open
                </span>
                <span class="flex items-center text-sm">
                    <span class="w-2 h-2 bg-purple-500 rounded-full mr-1"></span>
                    <span id="closedCount">0</span> Closed
                </span>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="hidden">
            <div class="flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>
        </div>

        <!-- Issues Grid -->
        <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Issues will be loaded here -->
        </div>
    </main>

    <!-- Modal -->
    <div id="issueModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-2xl font-bold text-gray-800" id="modalTitle"></h2>
                    <button id="closeModal" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div id="modalContent" class="space-y-4">
                    <!-- Modal content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/dashbosrd.js"></script>
</body>

</html>
